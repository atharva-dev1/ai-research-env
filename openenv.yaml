name: ai-research-env
version: "1.0.0"
description: >
  Simulation platform for end-to-end scientific discovery using AI agents.
  Agents navigate a structured research workflow — reading papers, forming
  hypotheses, designing/running experiments, analysing results, and producing
  final conclusions — across three ML research domains.

tags: [openenv, ai-research, scientific-discovery, rl-environment]

tasks:
  - id: cv-classification
    difficulty: easy
    max_steps: 8
    description: "Image classification under distribution shift (CIFAR-10 + noise)"
  - id: nlp-sentiment
    difficulty: medium
    max_steps: 10
    description: "Sentiment analysis with 20% noisy labels + cross-domain shift"
  - id: healthcare-tabular
    difficulty: hard
    max_steps: 12
    description: "ICU mortality prediction with missing data, leakage, and fairness constraints"

actions: [read_paper, propose_hypothesis, design_experiment, run_experiment, analyze_results, refine_hypothesis, final_answer]

observation_space:
  fields:
    task_id: string
    task_name: string
    difficulty: string
    research_context: string
    current_phase: string
    allowed_actions: array
    last_feedback: string
    step_number: integer
    max_steps: integer
    progress: object
    hints: array

action_space:
  fields:
    action_type: {type: string, enum: [read_paper, propose_hypothesis, design_experiment, run_experiment, analyze_results, refine_hypothesis, final_answer]}
    content: {type: string}
    parameters: {type: object, optional: true}

reward: {type: float, range: [0.0, 1.0]}

endpoints:
  reset:  POST /reset
  step:   POST /step
  state:  GET  /state/{session_id}
  health: GET  /health
  tasks:  GET  /tasks

docker: {port: 7860, build: "docker build -t ai-research-env .", run: "docker run -p 7860:7860 ai-research-env"}
huggingface: {space_sdk: docker, tags: [openenv]}
